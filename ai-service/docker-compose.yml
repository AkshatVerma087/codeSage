services:
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      VECTOR_DB_BACKEND: qdrant
      LLM_BACKEND: local
      LLM_MODEL_PATH: ./models/mistral-7b-instruct-v0.3.Q4_K_M.gguf
    volumes:
      - .:/app
      - ./models:/app/models:ro
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - qdrant

  worker:
    build:
      context: .
    command: celery -A app.celery_app.celery_app worker -l info
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      VECTOR_DB_BACKEND: qdrant
      LLM_BACKEND: local
      LLM_MODEL_PATH: ./models/mistral-7b-instruct-v0.3.Q4_K_M.gguf
    volumes:
      - .:/app
      - ./models:/app/models:ro
    depends_on:
      - redis
      - qdrant

volumes:
  redis_data:
  qdrant_data:
