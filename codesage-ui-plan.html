<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeSage — UI Implementation Plan</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c0c; --bg2:#111; --bg3:#161616; --bg4:#1c1c1c; --bg5:#222;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12); --border3:rgba(255,255,255,0.18);
  --text:#f0f0f0; --text2:#888; --text3:#444; --text4:#2a2a2a;
  --accent:#e8ff6b; --accent-dim:rgba(232,255,107,0.08);
  --green:#4ade80; --amber:#fb923c; --red:#f87171; --blue:#60a5fa; --purple:#a78bfa;
  --sans:'Geist',sans-serif; --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.5}

/* TOP BAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border2);padding:0 20px;height:48px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-size:14px;font-weight:700;letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:16px}
.progress-pill{background:var(--bg4);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-family:var(--mono);font-size:11px;color:var(--text2);display:flex;align-items:center;gap:8px}
.progress-pill-fill{height:4px;background:var(--bg5);border-radius:2px;width:100px;overflow:hidden}
.progress-pill-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.pct-label{color:var(--accent);font-weight:500;min-width:28px}
.reset-btn{font-family:var(--mono);font-size:11px;color:var(--text3);border:1px solid var(--border);border-radius:4px;padding:4px 10px;background:transparent;cursor:pointer;transition:all .15s}
.reset-btn:hover{border-color:var(--red);color:var(--red)}

/* PHASE TABS */
.phase-tabs{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:38px;display:flex;align-items:center;gap:4px;overflow-x:auto}
.phase-btn{font-family:var(--mono);font-size:11px;padding:3px 12px;border-radius:4px;border:1px solid transparent;color:var(--text3);background:transparent;cursor:pointer;white-space:nowrap;transition:all .12s;letter-spacing:0.2px}
.phase-btn:hover{color:var(--text2);background:var(--bg3)}
.phase-btn.on{background:var(--bg3);border-color:var(--border2);color:var(--text)}

/* CONTENT */
.content{max-width:860px;margin:0 auto;padding:24px 20px 60px}

/* SECTION HEADER */
.section-header{margin-bottom:24px}
.section-title{font-size:22px;font-weight:700;letter-spacing:-1px;color:var(--text);margin-bottom:4px}
.section-title span{color:var(--accent)}
.section-sub{font-size:12px;color:var(--text2);font-family:var(--mono)}
.section-note{background:var(--bg3);border:1px solid var(--border);border-left:2px solid var(--amber);border-radius:6px;padding:10px 14px;font-size:12px;color:var(--text2);margin-top:12px;line-height:1.6}
.section-note code{font-family:var(--mono);font-size:11px;background:var(--bg4);border:1px solid var(--border);padding:1px 5px;border-radius:3px;color:var(--blue)}

/* TASK GROUPS */
.task-group{margin-bottom:8px;border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .15s}
.task-group:hover{border-color:var(--border2)}
.task-group.done-all{border-color:rgba(74,222,128,0.2)}

.group-header{background:var(--bg2);padding:11px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;transition:background .12s}
.group-header:hover{background:var(--bg3)}
.group-tag{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 8px;border-radius:3px;white-space:nowrap;letter-spacing:0.3px}
.tag-html{background:rgba(251,146,60,0.1);border:1px solid rgba(251,146,60,0.2);color:var(--amber)}
.tag-css{background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.2);color:var(--blue)}
.tag-react{background:rgba(96,165,250,0.12);border:1px solid rgba(96,165,250,0.25);color:#7dd3fc}
.tag-js{background:rgba(232,255,107,0.08);border:1px solid rgba(232,255,107,0.18);color:var(--accent)}
.tag-context{background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.2);color:var(--purple)}
.tag-api{background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.18);color:var(--green)}
.tag-ux{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.2);color:var(--red)}
.tag-token{background:rgba(232,255,107,0.06);border:1px solid rgba(232,255,107,0.12);color:#c4d84a}

.group-title{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-0.2px;flex:1}
.group-prog{font-family:var(--mono);font-size:11px;color:var(--text3);white-space:nowrap}
.group-chevron{font-size:10px;color:var(--text3);transition:transform .2s}
.task-group.open .group-chevron{transform:rotate(90deg)}

.group-body{display:none;border-top:1px solid var(--border)}
.task-group.open .group-body{display:block}

/* TASKS */
.task{display:flex;align-items:flex-start;gap:10px;padding:9px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.task:last-child{border-bottom:none}
.task:hover{background:var(--bg3)}

.checkbox{width:15px;height:15px;min-width:15px;border-radius:3px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .12s;flex-shrink:0}
.task:hover .checkbox{border-color:var(--accent)}
.checkbox.checked{background:var(--accent);border-color:var(--accent)}
.checkbox.checked::after{content:'';display:block;width:8px;height:5px;border-left:1.5px solid #000;border-bottom:1.5px solid #000;transform:rotate(-45deg) translate(1px,-1px)}

.task-text{font-size:12px;color:var(--text);line-height:1.55;flex:1}
.task-text.checked{color:var(--text3);text-decoration:line-through;text-decoration-color:var(--border2)}
.task-text code{font-family:var(--mono);font-size:11px;background:var(--bg4);border:1px solid var(--border);padding:1px 5px;border-radius:3px;color:var(--blue)}
.task-text .file{font-family:var(--mono);font-size:11px;color:var(--purple)}
.task-text .prop{font-family:var(--mono);font-size:11px;color:var(--green)}
.task-text .warn{color:var(--amber)}

.output-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;padding:1px 7px;border-radius:3px;background:rgba(74,222,128,0.07);border:1px solid rgba(74,222,128,0.2);color:var(--green);margin-left:6px;vertical-align:middle;font-weight:600;letter-spacing:0.3px}

/* FILE SETUP CARD */
.setup-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:20px}
.setup-card-title{font-size:11px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.file-tree{font-family:var(--mono);font-size:11px;color:var(--text2);line-height:1.9}
.file-tree .dir{color:var(--blue)}
.file-tree .file-new{color:var(--green)}
.file-tree .file-edit{color:var(--amber)}

/* GLOBAL PROGRESS BAR */
.global-bar-wrap{height:2px;background:var(--bg4);width:100%;margin-bottom:24px;border-radius:1px;overflow:hidden}
.global-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:1px;transition:width .4s}

/* PHASE DISPLAY */
.phase-block{display:none}
.phase-block.on{display:block}

/* DONE FLASH */
.group-done-banner{background:rgba(74,222,128,0.06);border-top:1px solid rgba(74,222,128,0.15);padding:8px 16px;font-family:var(--mono);font-size:11px;color:var(--green);text-align:center;display:none}

/* RESPONSIVE */
@media(max-width:600px){
  .topbar-right .progress-pill-fill{width:60px}
  .phase-tabs{gap:2px}
  .phase-btn{font-size:10px;padding:3px 8px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Code<span>Sage</span> — UI Plan</div>
  <div class="topbar-right">
    <div class="progress-pill">
      <span id="done-count">0</span>/<span id="total-count">0</span>
      <div class="progress-pill-fill"><div class="progress-pill-bar" id="global-bar" style="width:0%"></div></div>
      <span class="pct-label" id="global-pct">0%</span>
    </div>
    <button class="reset-btn" onclick="resetAll()">reset</button>
  </div>
</div>

<div class="phase-tabs" id="phase-tabs"></div>

<div class="content" id="content">
  <div class="global-bar-wrap"><div class="global-bar-fill" id="global-bar2" style="width:0%"></div></div>
  <div id="phase-content"></div>
</div>

const STATE_KEY = 'cs_ui_plan_v1';
let state = {};
try{ state = JSON.parse(localStorage.getItem(STATE_KEY)||'{}'); }catch(e){}
let activePhase = 'setup';

function save(){ try{ localStorage.setItem(STATE_KEY, JSON.stringify(state)); }catch(e){} }

function tid(phaseId, gi, ti){ return `${phaseId}_g${gi}_t${ti}`; }

function phaseDone(phase){
  return phase.groups.reduce((a,g,gi)=>a+g.tasks.filter((_,ti)=>state[tid(phase.id,gi,ti)]).length,0);
}
function phaseTotal(phase){
  return phase.groups.reduce((a,g)=>a+g.tasks.length,0);
}
function globalDone(){ return PHASES.reduce((a,p)=>a+phaseDone(p),0); }
function globalTotal(){ return PHASES.reduce((a,p)=>a+phaseTotal(p),0); }

function groupDone(phaseId,gi,group){
  return group.tasks.filter((_,ti)=>state[tid(phaseId,gi,ti)]).length;
}

function toggleTask(phaseId,gi,ti){
  const id=tid(phaseId,gi,ti);
  state[id]=!state[id];
  save(); render();
}

function toggleGroup(phaseId,gi){
  const k=`open_${phaseId}_${gi}`;
  state[k]=!state[k];
  save(); render();
}

function setPhase(id){ activePhase=id; render(); }

function resetAll(){
  if(confirm('Reset all progress?')){ state={}; save(); render(); }
}

function renderTabs(){
  const bar = document.getElementById('phase-tabs');
  bar.innerHTML = PHASES.map(p=>{
    const done=phaseDone(p),total=phaseTotal(p);
    const allDone=done===total&&total>0;
    return `<button class="phase-btn${p.id===activePhase?' on':''}" onclick="setPhase('${p.id}')">${p.label}${allDone?' ✓':''}</button>`;
  }).join('');
}

function tagClass(tagLabel){
  const map={'Scaffold':'html','Tokens':'css','Routing':'react','CSS':'css','Component':'react','Context':'context','API':'api','Page':'react','Hook':'js','UX':'ux'};
  return 'tag-'+(map[tagLabel]||'html');
}

function render(){
  renderTabs();
  const done=globalDone(),total=globalTotal();
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('done-count').textContent=done;
  document.getElementById('total-count').textContent=total;
  document.getElementById('global-bar').style.width=pct+'%';
  document.getElementById('global-bar2').style.width=pct+'%';
  document.getElementById('global-pct').textContent=pct+'%';

  const phase = PHASES.find(p=>p.id===activePhase);
  const container = document.getElementById('phase-content');

  let html=`<div class="section-header">`;
  html+=`<div class="section-title">${phase.title}${phase.titleAccent?`<span>${phase.titleAccent}</span>`:''}</div>`;
  html+=`<div class="section-sub">${phase.sub}</div>`;
  if(phase.note) html+=`<div class="section-note">${phase.note}</div>`;
  html+=`</div>`;

  phase.groups.forEach((group,gi)=>{
    const done=groupDone(phase.id,gi,group);
    const total=group.tasks.length;
    const allDone=done===total&&total>0;
    const isOpen=state[`open_${phase.id}_${gi}`];
    const pct=total?Math.round(done/total*100):0;
    html+=`<div class="task-group${isOpen?' open':''}${allDone?' done-all':''}">`;
    html+=`<div class="group-header" onclick="toggleGroup('${phase.id}',${gi})">`;
    html+=`<span class="group-tag ${tagClass(group.tag||group.tagLabel)}">${group.tagLabel||group.tag}</span>`;
    html+=`<span class="group-title">${group.title}</span>`;
    html+=`<span class="group-prog">${done}/${total}</span>`;
    html+=`<span class="group-chevron">▶</span>`;
    html+=`</div>`;
    html+=`<div class="group-body">`;
    group.tasks.forEach((task,ti)=>{
      const id=tid(phase.id,gi,ti);
      const checked=!!state[id];
      html+=`<div class="task" onclick="toggleTask('${phase.id}',${gi},${ti})">`;
      html+=`<div class="checkbox${checked?' checked':''}"></div>`;
      html+=`<span class="task-text${checked?' checked':''}">${task}</span>`;
      html+=`</div>`;
    });
    if(allDone) html+=`<div class="group-done-banner" style="display:block">All done — move to next group.</div>`;
    html+=`</div></div>`;
  });

  container.innerHTML=html;
}

render();
</script>
</body>
</html>
